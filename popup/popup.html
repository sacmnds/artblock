<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Artblock Brasil</h1>
      <p class="tagline">Todo anúncio vira arte brasileira</p>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Ativado</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Controles ao passar o mouse</span>
      <label class="toggle">
        <input type="checkbox" id="showHoverControls" checked>
        <span class="slider"></span>
      </label>
    </div>
    <p class="feedback" id="hoverFeedback"></p>

    <button class="sources-btn" id="sourcesToggle">
      <span>Fontes</span>
      <span class="sources-chevron">›</span>
    </button>

    <div class="sources-content" id="sourcesContent" hidden>
      <div class="toggle-row">
        <div class="toggle-label-group">
          <span class="toggle-label">Modo aleatório</span>
          <span class="toggle-desc">Alternar todas as fontes</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="chaosMode">
          <span class="slider"></span>
        </label>
      </div>
      <div class="category-group">
        <div class="toggle-row">
          <span class="toggle-label">Modernismo</span>
          <label class="toggle"><input type="checkbox" id="cat-modernismo"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Academismo</span>
          <label class="toggle"><input type="checkbox" id="cat-academismo"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Paisagem</span>
          <label class="toggle"><input type="checkbox" id="cat-paisagem"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Histórica</span>
          <label class="toggle"><input type="checkbox" id="cat-historica"><span class="slider"></span></label>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Fotografia</span>
          <label class="toggle"><input type="checkbox" id="cat-fotografia"><span class="slider"></span></label>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-number" id="count">0</span>
        <span class="stat-label">anúncios substituídos nesta sessão</span>
      </div>
    </div>

    <div class="profile-section">
      <div class="section-label">Seu perfil</div>
      
      <div class="data-row">
        <button class="action-btn" id="exportSettings">Exportar configurações</button>
        <button class="action-btn" id="importSettings">Importar configurações</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      <p class="feedback" id="profileFeedback"></p>

      <div class="reset-row" id="resetSiteRow" style="display:none">
        <button class="reset-btn" id="resetSite">Redefinir configurações do site</button>
      </div>

      <div class="reset-row">
        <button class="reset-btn" id="resetProfile">Redefinir perfil</button>
      </div>
    </div>

    <div class="footer">
      <p>Brasiliana Museus &middot; IBRAM</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
